services:
  redis:
    image: docker.arvancloud.ir/redis:7.2-alpine
    container_name: gen_table_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: always

  mongodb:
    image: mongo:latest
    container_name: gen_table_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    env_file:
      - .env
    restart: always

  gen_table_database:
    image: docker.arvancloud.ir/postgres:17.4-bookworm
    container_name: gen_table_database
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env
    ports:
      - "5433:5432"
    restart: always

  gen_table:
    build: .
    container_name: gen_table
    command: sh -c "alembic upgrade head && uvicorn config:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - gen_table_database
      - redis
      - mongodb
    volumes:
      - .:/app
    restart: always

  celery_worker:
    build: .
    container_name: gen_table_celery_worker
    command: celery -A celery_worker worker --loglevel=info --concurrency=2
    env_file:
      - .env
    depends_on:
      - gen_table_database
      - redis
      - mongodb
    volumes:
      - .:/app
    restart: always

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  default:
    name: gen_table_net